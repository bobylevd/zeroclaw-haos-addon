name: ZeroClaw
version: 0.0.1
slug: zeroclaw
description: Minimal ZeroClaw add-on scaffold.
url: https://github.com/dbobylev/zeroclaw-haos-addon/tree/main/zeroclaw
arch:
  - aarch64
init: false
image: ghcr.io/bobylevd/{arch}-addon-zeroclaw
homeassistant_api: true
hassio_api: false
hassio_role: default
options:
  provider: openrouter
  api_key: null
  model: null
  telegram_bot_token: null
  telegram_allowed_users: ["*"]
  autonomy_level: supervised
  allow_cover: false
  allow_script: false
  allow_automation: false
  allow_event: false
  enable_memory: true
  enable_cost_tracking: true
  daily_cost_limit_usd: 2.0
  snapshot_refresh_hours: 4
schema:
  provider: str
  api_key: password
  model: str?
  telegram_bot_token: password
  telegram_allowed_users: [str]
  autonomy_level: list(read_only|supervised|full)
  allow_cover: bool
  allow_script: bool
  allow_automation: bool
  allow_event: bool
  enable_memory: bool
  enable_cost_tracking: bool
  daily_cost_limit_usd: float?
  snapshot_refresh_hours: int?
